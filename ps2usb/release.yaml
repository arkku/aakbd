artifacts: [hex]

base_flags:
  - -DENABLE_MEDIA_KEYS=1
  - -DMEDIA_KEYS_ENDPOINT=1
  - -DENABLE_BOOTLOADER_SHORTCUT=0
  - -DKEYBOARD_POLL_INTERVAL_MS=1
  - -DUSB_MAX_KEY_ROLLOVER=6
  - PS2_PORT=D
  - PS2_DATA_PIN=1
  - PS2_CLK_PIN=0
  - PS2_CLK_INT_NUM=0

options:
  - dvorak: -DDVORAK_MAPPINGS=1
    "": -DDVORAK_MAPPINGS=0
  - debug: -DPS2USB_DEBUG_SCANCODES=1 -DPS2USB_DEBUG_COMMANDS=1
    apple: -DENABLE_APPLE_FN_KEY=1 -DAPPLE_FN_IS_MODIFIER=0 -DUSB_VENDOR_ID=0x05ACU -DUSB_PRODUCT_ID=0x021EU
    "":
