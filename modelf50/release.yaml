artifacts: [hex]

base_flags:
  - VIAL_ENABLE=1
  - -DENABLE_MEDIA_KEYS=1
  - -DMEDIA_KEYS_ENDPOINT=1
  - -DCAPSENSE_CAL_DEBUG=1
  - -DCAPSENSE_CAL_BINS=3
  - -DENABLE_BOOTLOADER_SHORTCUT=0
  - -DKEYBOARD_POLL_INTERVAL_MS=1
  - ENABLE_HOST_FINGERPRINT=1
  - -DLED_NUM_LOCK_PIN=B4
  - -DLED_CAPS_LOCK_PIN=B5

options:
  - applefn: -DENABLE_APPLE_FN_KEY=1 -DAPPLE_FN_IS_MODIFIER=0 VENDOR_ID=0x05ACU PRODUCT_ID=0x021EU -DUSB_MAX_KEY_ROLLOVER=6
    "": -DUSB_MAX_KEY_ROLLOVER=7
  - dvorak: -DDVORAK_MAPPINGS=1
    "": -DDVORAK_MAPPINGS=0
  - numpad2u: -DSPLIT_PAD_ENTER=0 -DSPLIT_PAD_PLUS=0 -DSPLIT_PAD_ZERO=0
    "": -DSPLIT_PAD_ENTER=1 -DSPLIT_PAD_PLUS=1 -DSPLIT_PAD_ZERO=1
  - secure: VIAL_INSECURE=0 -DENABLE_DFU_INTERFACE=0 -DVIAL_ENABLE_MATRIX_TESTER=1
    secure_dfu: VIAL_INSECURE=0 -DENABLE_DFU_INTERFACE=1 -DVIAL_ENABLE_MATRIX_TESTER=1
    "": VIAL_INSECURE=1 -DENABLE_DFU_INTERFACE=1 -DVIAL_ENABLE_MATRIX_TESTER=0
  - ps2set23: ENABLE_PS2_DEVICE=1 -DENABLE_PS2_DEVICE_SET_1=0 -DENABLE_PS2_DEVICE_SET_3=1 -DENABLE_PS2_LEGACY_COMPATIBILITY=0 -DPS2_PORT=B -DPS2_DATA_PIN=6 -DPS2_CLK_PIN=7 -DVIAL_COMBO_COUNT=0 -DVIAL_MACRO_COUNT=16 -DVIAL_TAP_DANCE_COUNT=4 -DENABLE_AUTOSHIFT=0 -DENABLE_SPACE_CADET=1
    solenoid: HAPTIC_ENABLE=1 -DMAX_POWER_CONSUMPTION_MA=500 -DVIAL_COMBO_COUNT=4 -DVIAL_MACRO_COUNT=16 -DVIAL_TAP_DANCE_COUNT=4 -DENABLE_AUTOSHIFT=1 -DENABLE_SPACE_CADET=1 -DSOLENOID_PIN=B6 -DHAPTIC_ENABLE_PIN=B7
    minimal: -DVIAL_COMBO_COUNT=0 -DVIAL_MACRO_COUNT=0 -DVIAL_TAP_DANCE_COUNT=0 -DENABLE_AUTOSHIFT=0 -DENABLE_SPACE_CADET=1 -DLED_SCROLL_LOCK_PIN=B6
    "": -DVIAL_COMBO_COUNT=4 -DVIAL_MACRO_COUNT=16 -DVIAL_TAP_DANCE_COUNT=4 -DENABLE_AUTOSHIFT=1 -DENABLE_SPACE_CADET=1 -DLED_SCROLL_LOCK_PIN=B6
